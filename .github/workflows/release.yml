name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: cybrium-agent-darwin-arm64
          - target: x86_64-apple-darwin
            # arm Mac runner cross-compiles cleanly to x86_64-apple-darwin.
            # macos-13 was deprecated and queues for hours — sometimes
            # never picks up at all.
            os: macos-14
            artifact: cybrium-agent-darwin-amd64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cybrium-agent-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: cybrium-agent-linux-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: cybrium-agent-windows-amd64.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: cybrium-agent-windows-arm64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/cybrium-agent ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/cybrium-agent.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum cybrium-agent-* > checksums-sha256.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            cybrium-agent-*
            checksums-sha256.txt
